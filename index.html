<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Welcome</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css?family=Inconsolata" rel="stylesheet">

    <style>
      :root {
        --bg: #000;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        overflow: hidden;
        font-family: 'Inconsolata', monospace;
      }

      #container {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        touch-action: none; /* we handle touch manually */
      }

      /* Loading overlay */
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: #fff;
        font-family: 'Inconsolata', monospace;
        font-size: 14px;
        letter-spacing: 0.15em;
        opacity: 1;
        transition: opacity 0.6s ease;
        pointer-events: none;
        z-index: 10;
      }
      #loader.hidden {
        opacity: 0;
      }

      a {
        color: inherit;
        text-decoration: none;
      }
      a:hover {
        font-weight: bold;
      }

      @media (prefers-reduced-motion: reduce) {
        #loader { transition: none; }
      }
    </style>
  </head>

  <body>
    <div id="loader">loading...</div>
    <div id="container"></div>

    <!-- Three.js r158 (stable modern release) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.158.0/three.min.js"></script>
    <!-- OrbitControls from the matching build -->
    <script src="vendor/orbitControls.js"></script>
    <script src="ascii-renderer.js"></script>

    <script>
      (function () {
        'use strict';

        // ── Config ────────────────────────────────────────────────────────────
        var CHAR_SET =
          '0100011001101111011100100010000001000111011011110' +
          '1100100001000000111001101110011010111001101100101' +
          '0110110001101111011101100110010101100100001000000' +
          '1110100011010000110010100100000011101110110111101' +
          '1100100110110001100100001000000111010001101000011' +
          '0000101110100001000000110100001100101001000000110' +
          '0111011010010111011001100101001000000110100001101' +
          '0010111001100100000011011110110111001100101001000' +
          '000110000101101110011001000010000001101111011011' +
          '01011011000111100100100000010100110110111101101110' +
          '0010110000100000011101000110100001100001011101000' +
          '0100000011101110110100001101111011001010111011001' +
          '1001010111001000100000011000100110010101101100011' +
          '0100101100101011101100110010101110011001000000110' +
          '1001011011100010000001101000011010010110110100100' +
          '0000111001101101000011000010110110001101100001000' +
          '000110111001101111011100000110010101110010011010' +
          '01011100000110100000100000011000100111010101110100' +
          '0010000001101000011000010111011001100101001000000' +
          '1100101011101000110010101110010011011100110000101' +
          '1011000010000001101100011010010110011001100101010' +
          '0100000';

        var TEXTURE_PATH   = 'earth.jpg';
        var USE_ORTHO_CAM  = false;
        var REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // ── Zoom limits (world units) ─────────────────────────────────────────
        // Globe radius = 200. We want:
        //   MAX zoom-in  → globe just touches the shorter screen edge
        //   MIN zoom-out → "fly away" (~1.8× the default far distance)
        var GLOBE_RADIUS   = 200;
        var FOV_DEG        = 25;
        var FOV_RAD        = FOV_DEG * Math.PI / 180;
        var CAM_FAR_DEFAULT = 1030;
        var CAM_FLY_AWAY   = 2200;  // how far the camera can fly back

        // ── State ─────────────────────────────────────────────────────────────
        var container, camera, controls, scene, renderer, asciiRenderer, sphere;
        var clock = { start: Date.now() };

        // ── Init ──────────────────────────────────────────────────────────────
        function init() {
          container = document.getElementById('container');

          var w = container.clientWidth  || window.innerWidth;
          var h = container.clientHeight || window.innerHeight;

          // WebGL renderer
          renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
          container.appendChild(renderer.domElement);

          // ASCII post-processor
          asciiRenderer = new AsciiRenderer(renderer, {
            charSet : CHAR_SET,
            fontSize: 12,
            opacity : 0.7,
          });

          // Camera
          if (USE_ORTHO_CAM) {
            camera = new THREE.OrthographicCamera(w / -2, w / 2, h / 2, h / -2, 1, CAM_FLY_AWAY);
          } else {
            camera = new THREE.PerspectiveCamera(FOV_DEG, w / h, 1, CAM_FLY_AWAY);
          }
          camera.position.z = 1000;

          // Scene
          scene = new THREE.Scene();

          var sunlight = new THREE.DirectionalLight(0xffffff, 1.5);
          sunlight.position.set(1, 0, 1);
          scene.add(sunlight);

          // Globe
          var loader = new THREE.TextureLoader();
          loader.load(
            TEXTURE_PATH,
            function (sphereTex) {
              sphereTex.magFilter = THREE.NearestFilter;
              sphereTex.minFilter = THREE.NearestFilter;

              var sphereMat = new THREE.MeshToonMaterial({
                map        : sphereTex,
                color      : 0xffffff,
                shininess  : 0,
                reflectivity: 0,
              });

              // SphereGeometry replaces deprecated SphereBufferGeometry
              sphere = new THREE.Mesh(
                new THREE.SphereGeometry(GLOBE_RADIUS, 20, 10),
                sphereMat
              );
              scene.add(sphere);

              hideLoader();
            },
            undefined,
            function (err) {
              // Texture failed — still show the scene with a plain material
              console.warn('earth.jpg failed to load, using fallback material.', err);
              var fallbackMat = new THREE.MeshToonMaterial({ color: 0x334455 });
              sphere = new THREE.Mesh(
                new THREE.SphereGeometry(GLOBE_RADIUS, 20, 10),
                fallbackMat
              );
              scene.add(sphere);
              hideLoader();
            }
          );

          // Orbit controls
          controls = new THREE.OrbitControls(camera, container);
          controls.enablePan    = false;
          controls.enableZoom   = true;
          controls.zoomSpeed    = 0.03;
          controls.minDistance  = computeMinDistance(); // globe edge → screen edge
          controls.maxDistance  = CAM_FLY_AWAY;
          controls.minAzimuthAngle = -Math.PI / 4;
          controls.maxAzimuthAngle =  Math.PI * 3 / 4;
          controls.enableDamping = true;
          controls.dampingFactor = 0.07;
          controls.rotateSpeed   = 0.05;
          controls.update();

          window.addEventListener('resize', onResize, { passive: true });
          onResize();
          animate();
        }

        // ── Zoom limit helpers ────────────────────────────────────────────────
        // Compute the camera distance at which the globe just touches the
        // shorter viewport edge (portrait: width edge; landscape: height edge).
        function computeMinDistance() {
          var w = container.clientWidth  || window.innerWidth;
          var h = container.clientHeight || window.innerHeight;
          var shortEdgeHalf = Math.min(w, h) / 2;

          // For a perspective camera, half-height at distance d = d * tan(fov/2).
          // We want GLOBE_RADIUS == shortEdgeHalf-in-world-units, so:
          //   d * tan(fov/2) * (shortEdge/h) = GLOBE_RADIUS   [for width edge]
          //   d * tan(fov/2)                 = GLOBE_RADIUS   [for height edge]
          // Simpler unified form: treat the short edge as the limiting factor.
          var aspect = w / h;
          var tanHalfFov = Math.tan(FOV_RAD / 2);

          var minDist;
          if (w < h) {
            // Portrait: width is the constraint
            // half-width at d = d * tanHalfFov * aspect
            minDist = GLOBE_RADIUS / (tanHalfFov * aspect);
          } else {
            // Landscape: height is the constraint
            minDist = GLOBE_RADIUS / tanHalfFov;
          }

          // Add a small margin so it doesn't clip exactly at the edge
          return Math.max(minDist * 1.05, 300);
        }

        // ── Resize ────────────────────────────────────────────────────────────
        function onResize() {
          var w = container.clientWidth;
          var h = container.clientHeight;

          camera.aspect = w / h;
          camera.updateProjectionMatrix();

          asciiRenderer.setSize(w, h);

          // Recalculate zoom limits on every resize / orientation change
          if (controls) {
            controls.minDistance = computeMinDistance();
            controls.maxDistance = CAM_FLY_AWAY;
            controls.update();
          }
        }

        // ── Loop ──────────────────────────────────────────────────────────────
        function animate() {
          requestAnimationFrame(animate);
          render();
        }

        function render() {
          if (sphere && !REDUCED_MOTION) {
            sphere.rotation.y = (Date.now() - clock.start) * 0.0002;
          }
          controls.update();
          renderer.render(scene, camera);
        }

        // ── Loader ────────────────────────────────────────────────────────────
        function hideLoader() {
          var loader = document.getElementById('loader');
          if (!loader) return;
          loader.classList.add('hidden');
          setTimeout(function () {
            if (loader.parentNode) loader.parentNode.removeChild(loader);
          }, 700);
        }

        // ── Start ─────────────────────────────────────────────────────────────
        init();

      }());
    </script>
  </body>
</html>
