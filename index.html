<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Welcome</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css?family=Inconsolata" rel="stylesheet">

    <style>
      :root {
        --ascii-bg-color: #000;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: var(--ascii-bg-color);
        overflow: hidden;
        font-family: 'Inconsolata', monospace;
      }

      #container {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        /* Let OrbitControls handle all touch events */
        touch-action: none;
      }

      /* Loading overlay */
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--ascii-bg-color);
        color: #fff;
        font-family: 'Inconsolata', monospace;
        font-size: 14px;
        letter-spacing: 0.15em;
        opacity: 1;
        transition: opacity 0.6s ease;
        pointer-events: none;
        z-index: 10;
      }
      #loader.hidden {
        opacity: 0;
      }

      a { color: inherit; text-decoration: none; }
      a:hover { font-weight: bold; }

      @media (prefers-reduced-motion: reduce) {
        #loader { transition: none; }
      }
    </style>
  </head>

  <body>
    <div id="loader">loading...</div>
    <div id="container"></div>

    <script src="ascii-renderer.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      // ── Config ──────────────────────────────────────────────────────────────
      const CHAR_SET =
        '0100011001101111011100100010000001000111011011110' +
        '1100100001000000111001101101110011010111001101100' +
        '1010110110001101111011101100110010101100100001000' +
        '0000111010001101000011001010010000001110111011011' +
        '1101100100110110001100100001000000111010001101000' +
        '0110000101110100001000000110100001100101001000000' +
        '1100111011010010111011001100101001000000110100001' +
        '1010010111001100100000011011110110111001100101001' +
        '0000001100001011011100110010000100000011011110110' +
        '1101011011000111100100100000010100110110111101101' +
        '1100010110000100000011101000110100001100001011101' +
        '0000100000011101110110100001101111011001010111011' +
        '0011001010111001000100000011000100110010101101100' +
        '0110100101100101011101100110010101110011001000000' +
        '1101001011011100010000001101000011010010110110100' +
        '1000000111001101101000011000010110110001101100001' +
        '0000001101110011011110111000001100101011100100110' +
        '1001011100000110100000100000011000100111010101110' +
        '1000010000001101000011000010111011001100101001000' +
        '0001100101011101000110010101110010011011100110000' +
        '1011011000010000001101100011010010110011001100101' +
        '0100100000';

      const TEXTURE_PATH   = 'earth.jpg';
      const USE_ORTHO_CAM  = false;
      const REDUCED_MOTION = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      // ── Zoom limits ──────────────────────────────────────────────────────────

      const GLOBE_RADIUS = 200;
      const FOV_DEG      = 25;
      const FOV_RAD      = FOV_DEG * Math.PI / 180;
      const CAM_FLY_AWAY = 2200;

      // ── State ────────────────────────────────────────────────────────────────
      let container, camera, controls, scene, renderer, asciiRenderer, sphere;
      const startTime = Date.now();


      function computeMinDistance() {
        const w         = container.clientWidth  || window.innerWidth;
        const h         = container.clientHeight || window.innerHeight;
        const aspect    = w / h;
        const tanHalfFov = Math.tan(FOV_RAD / 2);

        // Portrait: width is the tighter constraint; landscape: height.
        // half-height at d = d * tanHalfFov
        // half-width  at d = d * tanHalfFov * aspect
        const minDist = w < h
          ? GLOBE_RADIUS / (tanHalfFov * aspect)   // portrait
          : GLOBE_RADIUS / tanHalfFov;              // landscape

        return Math.max(minDist * 1.05, 300);
      }

      function hideLoader() {
        const loader = document.getElementById('loader');
        if (!loader) return;
        loader.classList.add('hidden');
        setTimeout(() => loader.remove(), 700);
      }

      function addGlobe(material) {
        sphere = new THREE.Mesh(
          new THREE.SphereGeometry(GLOBE_RADIUS, 20, 10),
          material
        );
        scene.add(sphere);
        hideLoader();
      }

      // ── Init ─────────────────────────────────────────────────────────────────
      function init() {
        container = document.getElementById('container');

        const w = container.clientWidth  || window.innerWidth;
        const h = container.clientHeight || window.innerHeight;

        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });
        container.appendChild(renderer.domElement);

        asciiRenderer = new AsciiRenderer(renderer, {
          charSet : CHAR_SET,
          fontSize: 12,
          opacity : 0.7,
        });

        // Camera
        if (USE_ORTHO_CAM) {
          camera = new THREE.OrthographicCamera(w / -2, w / 2, h / 2, h / -2, 1, CAM_FLY_AWAY);
        } else {
          camera = new THREE.PerspectiveCamera(FOV_DEG, w / h, 1, CAM_FLY_AWAY);
        }
        camera.position.z = 1000;

        // Scene + lighting
        scene = new THREE.Scene();
        const sunlight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunlight.position.set(1, 0, 1);
        scene.add(sunlight);

        new THREE.TextureLoader().load(
          TEXTURE_PATH,
          (tex) => {
            tex.magFilter = THREE.NearestFilter;
            tex.minFilter = THREE.NearestFilter;
            addGlobe(new THREE.MeshToonMaterial({
              map         : tex,
              color       : 0xffffff,
              shininess   : 0,
              reflectivity: 0,
            }));
          },
          undefined,
          (err) => {
            console.warn('earth.jpg failed to load, using fallback material.', err);
            addGlobe(new THREE.MeshToonMaterial({ color: 0x334455 }));
          }
        );

        controls = new OrbitControls(camera, container);
        controls.enablePan       = false;
        controls.enableZoom      = true;
        controls.zoomSpeed       = 0.03;
        controls.minDistance     = computeMinDistance();
        controls.maxDistance     = CAM_FLY_AWAY;
        controls.minAzimuthAngle = -Math.PI / 4;
        controls.maxAzimuthAngle =  Math.PI * 3 / 4;
        controls.enableDamping   = true;
        controls.dampingFactor   = 0.07;
        controls.rotateSpeed     = 0.05;
        controls.update();

        window.addEventListener('resize', onResize, { passive: true });
        onResize();
        animate();
      }

      // ── Resize ───────────────────────────────────────────────────────────────
      function onResize() {
        const w = container.clientWidth;
        const h = container.clientHeight;

        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        asciiRenderer.setSize(w, h);

        if (controls) {
          controls.minDistance = computeMinDistance();
          controls.maxDistance = CAM_FLY_AWAY;
          controls.update();
        }
      }

      // ── Loop ─────────────────────────────────────────────────────────────────
      function animate() {
        requestAnimationFrame(animate);
        if (sphere && !REDUCED_MOTION) {
          sphere.rotation.y = (Date.now() - startTime) * 0.0002;
        }
        controls.update();
        renderer.render(scene, camera);
      }

      // ── Start ─────────────────────────────────────────────────────────────────
      init();
    </script>
  </body>
</html>
